<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Velvet Crust Cakes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container centered-card">
        <div class="logo" style="margin-bottom: 20px;">Velvet Crust</div>
        <h2>Welcome Back</h2>

        <form action="index.html">
            <div class="input-group" style="margin-bottom: 15px;">
                <input type="email" placeholder="Email Address" required
                style="width:100%; padding:12px; border-radius:15px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.2); color:white;">
            </div>

            <div class="input-group" style="margin-bottom: 25px;">
                <input type="password" placeholder="Password" required
                style="width:100%; padding:12px; border-radius:15px; border:1px solid var(--glass-border); background:rgba(255,255,255,0.2); color:white;">
            </div>

            <button type="submit" class="btn-cream" style="width: 100%;">Sign In</button>
        </form>

        <p style="margin-top: 20px;">
            <a href="index.html" class="back-link">← Back to Home</a>
        </p>
    </div>
</body>
</html>
