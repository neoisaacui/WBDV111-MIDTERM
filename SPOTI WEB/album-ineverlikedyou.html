<!DOCTYPE html>
<html>
<head>
    <style>
     
        body {
            margin: 0;
            background: #0f0f0f;
            color: #f0f0f0;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .album-page {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        
        .back-btn {
            align-self: flex-start;
            margin-bottom: 30px;
            padding: 10px 20px;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, background 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #2575fc, #6a11cb);
        }

       
        .album-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .album-header img {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }

        .album-header img:hover {
            transform: scale(1.05);
        }

        .album-info h1 {
            margin: 10px 0 5px 0;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .album-info p {
            margin: 3px 0;
            color: #c0c0c0;
            font-size: 1rem;
            text-align: center;
        }

       
        .tracklist {
            margin-top: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .track {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-radius: 20px;
            background: #1a1a1a;
            transition: background 0.3s, transform 0.2s;
        }

        .track:hover {
            background: #2a2a2a;
            transform: scale(1.02);
        }

        .track span {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
        }

        .duration {
            margin-left: 10px;
            color: #b3b3b3;
            width: 50px;
            text-align: right;
            font-size: 0.9rem;
        }

        .play-btn {
            background: #6a11cb;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-size: 1.1rem;
        }

        .play-btn:hover {
            transform: scale(1.1);
            background: #2575fc;
        }

       
        .player-controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .control-btn {
            background: #6a11cb;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            transition: transform 0.2s, background 0.3s;
        }

        .control-btn:hover {
            transform: scale(1.1);
            background: #2575fc;
        }

        .volume-slider {
            width: 120px;
        }

        audio {
            display: none;
        }
    </style>
    <title>FUTURE</title>
</head>
<body>
    <div class="album-page">

        <a href="index.html" class="back-btn">← Back to Library</a>

        <div class="album-header">
            <img src="future.jpg" alt="I Never Liked You">
            <div class="album-info">
                <h1>I Never Liked You</h1>
                <p>Future</p>
                <p>2022</p>
            </div>
        </div>

        <div class="tracklist">
            <div class="track">
                <span>BACK TO BASICS</span>
                <span class="duration"></span>
                <div class="play-btn">▶</div>
            </div>
            <div class="track">
                <span>LOVE YOU BETTER</span>
                <span class="duration"></span>
                <div class="play-btn">▶</div>
            </div>
            <div class="track">
                <span>PUFFIN ON ZOOTIEZ</span>
                <span class="duration"></span>
                <div class="play-btn">▶</div>
            </div>
            <div class="track">
                <span>WAIT FOR YOU</span>
                <span class="duration"></span>
                <div class="play-btn">▶</div>
            </div>
        </div>

     
        <audio id="audioPlayer"></audio>


        <div class="player-controls">
            <div class="control-btn" id="prev">⏮</div>
            <div class="control-btn" id="playPause">▶</div>
            <div class="control-btn" id="next">⏭</div>
            <input type="range" id="volume" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script>
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPause');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const volumeSlider = document.getElementById('volume');

        const tracks = [
            {src: 'backtobasics.mp3', title: 'BACK TO BASICS', duration: '2:59'},
            {src: 'loveyoubetter.mp3', title: 'LOVE YOU BETTER', duration: '2:12'},
            {src: 'puffin.mp3', title: 'PUFFIN ON ZOOTIEZ', duration: '2:55'},
            {src: 'waitforu.mp3', title: 'WAIT FOR YOU', duration: '3:09'}
        ];

        const trackElements = document.querySelectorAll('.track');
        let currentTrack = 0;

        trackElements.forEach((track, index) => {
            track.querySelector('.duration').textContent = tracks[index].duration;
            track.querySelector('.play-btn').addEventListener('click', () => {
                currentTrack = index;
                loadTrack(currentTrack);
            });
        });

        function loadTrack(index) {
            audio.src = tracks[index].src;
            audio.play();
            playPauseBtn.textContent = '⏸';
        }

        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.textContent = '⏸';
            } else {
                audio.pause();
                playPauseBtn.textContent = '▶';
            }
        });

        nextBtn.addEventListener('click', () => {
            currentTrack = (currentTrack + 1) % tracks.length;
            loadTrack(currentTrack);
        });

        prevBtn.addEventListener('click', () => {
            currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
            loadTrack(currentTrack);
        });

        volumeSlider.addEventListener('input', () => {
            audio.volume = volumeSlider.value;
        });

        audio.addEventListener('ended', () => {
            playPauseBtn.textContent = '▶';
        });
    </script>
</body>
</html>
