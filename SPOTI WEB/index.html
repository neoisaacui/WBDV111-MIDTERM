<!DOCTYPE html>
<html>
<head>
    <title>Home Web</title>

    <style>
        body {
            margin: 0;
            background: #121212;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #1DB954;
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.6); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.6); opacity: 0.5; }
        }

        .hidden {
            display: none;
        }

        .app {
            display: grid;
            grid-template-columns: 240px 1fr;
            height: 100vh;
        }

        .sidebar {
            background: #290245;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            margin: 15px 0;
            color: #b3b3b3;
            text-decoration: none;
            cursor: pointer;
        }

        .sidebar a:hover {
            color: white;
        }

        .content {
             padding: 30px;
            overflow-y: auto;
             background:
            linear-gradient(
            rgba(18,18,18,0.35),
            rgba(18,18,18,0.55) ),
            url("bgg.jpg") center / cover no-repeat;

    backdrop-filter: blur(3px);
}

        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #b3b3b3;
            color: white;
            padding: 8px 16px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .logout-btn:hover {
            border-color: white;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 12px 15px;
            border-radius: 20px;
            border: none;
            outline: none;
            margin-bottom: 25px;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            
        }

        .card {
            background: #181818;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .card img {
            width: 100%;
            height: 220px;
            border-radius: 10px;
            object-fit: cover;
        }

        .card:hover {
            background: #282828;
        }

        .card::after {
            content: "▶";
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #1DB954;
            color: black;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover::after {
            opacity: 1;
        }
    </style>
</head>

<body>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}
</script>

<div id="loader">
    <div class="loader-circle"></div>
</div>

<div class="app hidden" id="app">
    <aside class="sidebar">
        <h2>SpotiWeb</h2>
        <nav>
            <a>🏠 Home</a>
            <a>📚 Your Library</a>
            <a href="explore.html">🧭 Explore</a>
        </nav>
    </aside>

    <main class="content">
        <div class="top-bar">
            <button class="logout-btn" onclick="logout()">Log out</button>
        </div>

        <h1>Hello, Welcome!</h1>

        <input 
            type="text" 
            class="search-box" 
            placeholder="Search albums or artists..."
            onkeyup="searchAlbums()"
        >

        <div class="cards">
            <a href="album-iammusic.html" class="card">
                <img src="iammusic.jpg" alt="I Am Music">
            </a>

            <a href="album-nothingwasthesame.html" class="card">
                <img src="drizzy.jpg" alt="Drake">
            </a>

            <a href="album-pnd.html" class="card">
                <img src="pnd.jpg" alt="PARTYNEXTDOOR">
            </a>

            <a href="album-ineverlikedyou.html" class="card">
                <img src="future.jpg" alt="Future">
            </a>

            <a href="album-jcole.html" class="card">
                <img src="jcole.jpg" alt="J Cole">
            </a>
        </div>
    </main>
</div>

<script>
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
        document.getElementById("app").classList.remove("hidden");
    }, 1200);
});

function logout() {
    localStorage.removeItem("loggedIn");
    window.location.href = "login.html";
}

function searchAlbums() {
    const input = document.querySelector(".search-box").value.toLowerCase();
    const cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        const imgAlt = card.querySelector("img").alt.toLowerCase();
        card.style.display = imgAlt.includes(input) ? "flex" : "none";
    });
}
</script>

</body>
</html>
