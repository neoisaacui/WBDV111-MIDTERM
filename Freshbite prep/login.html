<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
:root {
  --bg-main: #121212;
  --card-bg: #1E1E1E;
  --primary: #2ECC71;
  --primary-dark: #27AE60;
  --text-main: #EAEAEA;
  --text-muted: #A0A0A0;
  --border: #2A2A2A;
}

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #121212, #1b3a2f);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  color: var(--text-main);
}


.box {
  background: var(--card-bg);
  padding: 35px 30px;
  border-radius: 16px;
  width: 320px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.8);
}


.box h2 {
  text-align: center;
  margin-bottom: 25px;
  letter-spacing: 1px;
}


input {
  width: 95%;
  padding: 10px;
  margin: 9px 0;
  background: #121212;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-main);
  font-size: 14px;
}

input::placeholder {
  color: var(--text-muted);
}

input:focus {
  outline: none;
  border-color: var(--primary);
}


button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  background: var(--primary);
  border: none;
  border-radius: 8px;
  font-weight: bold;
  color: #000;
  cursor: pointer;
  transition: background 0.2s ease;
}

button:hover {
  background: var(--primary-dark);
}
</style>
</head>

<body>

<form class="box" action="freshbite.html" method="get">
  <h2>Welcome</h2>

  <input type="text" placeholder="Username" required>
  <input type="password" placeholder="Password" required>

  <button type="submit">Login</button>
</form>

</body>
</html>
