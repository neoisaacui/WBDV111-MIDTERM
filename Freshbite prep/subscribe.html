<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - FreshBite</title>
<style>
:root {
  --bg-main: #f9f9f9;         
  --card-bg: #ffffff;         
  --primary: #2E7D32;          
  --primary-light: #81C784;   
  --text-main: #212121;        
  --text-muted: #555555;      
  --border: #e0e0e0;           
  --input-bg: #ffffff;         
}


body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}


.back-link {
  position: absolute;
  top: 20px;
  left: 20px;
}

.back-link a {
  text-decoration: none;
  color: var(--primary);
  font-weight: 600;
  transition: color 0.3s;
}

.back-link a:hover {
  color: var(--primary-light);
}


.checkout-box {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 30px;
  max-width: 500px;
  width: 100%;
  box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}


.checkout-box h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 26px;
}


label {
  font-size: 14px;
  font-weight: 600;
  margin-top: 15px;
  display: block;
}

input, select {
  width: 95%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text-main);
  font-size: 14px;
}

input:focus, select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 8px rgba(46,125,50,0.3);
}


.place-order {
  display: block;
  width: 100%;
  text-align: center;
  background: var(--primary);
  color: #fff;
  padding: 14px;
  border-radius: 12px;
  font-weight: 600;
  text-decoration: none;
  font-size: 16px;
  margin-top: 15px;
  transition: all 0.3s;
}

.place-order:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(46,125,50,0.3);
}
</style>
</head>

<body>

<div class="back-link">
  <a href="freshbite.html">⬅ Back to Menu</a>
</div>

<div class="checkout-box">
  <h2>Checkout</h2>


  <label for="fullname">Full Name</label>
  <input type="text" id="fullname" placeholder="Enter your full name">

  <label for="address">Address</label>
  <input type="text" id="address" placeholder="Enter your delivery address">

  <label for="contact">Contact Number</label>
  <input type="text" id="contact" placeholder="09XXXXXXXXX">

  <label for="payment">Payment Method</label>
  <select id="payment">
    <option>Cash on Delivery</option>
    <option>GCash</option>
    <option>Credit Card</option>
  </select>

  <a href="index.html" class="place-order">Place Order</a>
</div>

</body>
</html>
