<!DOCTYPE html>

<meta charset="UTF-8">
<title>FreshBite Prep</title>

<style>
:root {
  --bg-main: #f9f9f9;       
  --card-bg: #ffffff;         
  --navbar-bg: #4CAF50;       
  --primary: #2E7D32;         
  --primary-light: #81C784;   
  --text-main: #212121;      
  --text-muted: #757575;      
  --border: #e0e0e0;         
}


body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
}


.navbar {
  background: var(--navbar-bg);
  color: #fff;
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

.navbar a {
  color: #fff;
  text-decoration: none;
  margin-left: 20px;
  font-weight: bold;
  transition: color 0.3s;
}

.navbar a:hover {
  color: var(--primary-light);
}


section {
  padding: 40px;
}

section h2 {
  margin-bottom: 20px;
  font-size: 28px;
  color: var(--text-main);
}


.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 25px;
}


.menu-card {
  background: var(--card-bg);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.menu-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.15);
}

.menu-card img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.menu-card div {
  padding: 15px;
}

.menu-card h3 {
  margin: 0;
  font-size: 18px;
  color: var(--text-main);
}

.menu-card p {
  color: var(--text-muted);
  margin: 6px 0 0;
  font-size: 14px;
}
</style>
</head>
